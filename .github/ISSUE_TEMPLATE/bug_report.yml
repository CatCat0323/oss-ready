name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve oss-ready. Do not include private source code or secrets.
  - type: input
    id: version
    attributes:
      label: oss-ready version
      placeholder: "oss-ready 0.1.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Operating system
      options: [Linux, macOS, Windows, Other]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide a minimal public example when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

