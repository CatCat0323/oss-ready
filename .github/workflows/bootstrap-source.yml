name: Bootstrap source via PR (workflow-safe)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-source.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Unpack archive and open PR (excludes .github/workflows/)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euxo pipefail

          command -v unzip >/dev/null 2>&1 || (apt-get update -y && apt-get install -y unzip)

          ls -la oss-ready-remaining.zip || { echo "ARCHIVE MISSING"; exit 1; }

          unzip -o oss-ready-remaining.zip
          rm -f oss-ready-remaining.zip

          git add -A
          git restore --staged .github/workflows/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="bootstrap-upload"
          git checkout -b "$BRANCH"

          git commit -m "Add oss-ready source, tests, docs, and issue templates"

          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          git push "$REMOTE" "$BRANCH" --force

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Add oss-ready source, tests, docs, and issue templates" \
            --body "Automated bootstrap (ci.yml excluded to avoid GitHub workflow-file token restriction)." \
            || echo "PR may already exist"
