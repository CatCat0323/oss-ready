name: Bootstrap repository files

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/oss-ready-bootstrap.yml

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Unpack archive and commit project files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          echo "== ensure unzip is available =="
          command -v unzip >/dev/null 2>&1 || (apt-get update -y && apt-get install -y unzip)

          echo "== verify archive is present =="
          ls -la oss-ready-remaining.zip || { echo "ARCHIVE MISSING - nothing to unpack"; exit 1; }

          echo "== extract project files =="
          unzip -o oss-ready-remaining.zip

          echo "== remove temporary bootstrap artifacts =="
          rm -f oss-ready-remaining.zip
          rm -f .github/workflows/oss-ready-bootstrap.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit - repository already complete"
            exit 0
          fi

          git commit -m "Add source, tests, docs, and CI"

          echo "== push (retry with rebase on non-fast-forward) =="
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          for i in 1 2 3; do
            if git push "$REMOTE" HEAD:main; then
              echo "PUSH OK"
              exit 0
            fi
            echo "push rejected, rebasing (attempt $i) ..."
            git fetch origin main
            git rebase origin/main || { echo "rebase conflict - aborting"; git rebase --abort; exit 1; }
          done
          echo "push failed after retries"
          exit 1
