name: Bootstrap repository files

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/oss-ready-bootstrap.yml

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack and commit project files
        run: |
          unzip -o oss-ready-remaining.zip
          rm oss-ready-remaining.zip
          rm .github/workflows/oss-ready-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add source, tests, docs, and CI"
          git push
