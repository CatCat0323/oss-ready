name: Bootstrap repository files (via PR)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/oss-ready-bootstrap-pr.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Unpack archive and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euxo pipefail

          echo "== ensure unzip is available =="
          command -v unzip >/dev/null 2>&1 || (apt-get update -y && apt-get install -y unzip)

          echo "== verify archive is present =="
          ls -la oss-ready-remaining.zip || { echo "ARCHIVE MISSING - nothing to unpack"; exit 1; }

          echo "== extract project files =="
          unzip -o oss-ready-remaining.zip

          echo "== remove temporary bootstrap artifacts =="
          rm -f oss-ready-remaining.zip
          rm -f .github/workflows/oss-ready-bootstrap.yml
          rm -f .github/workflows/oss-ready-bootstrap-pr.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="bootstrap-upload"
          git checkout -b "$BRANCH"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit - repository already complete"
            exit 0
          fi

          git commit -m "Add source, tests, docs, and CI"

          echo "== push to a new branch (bypass main protection) =="
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          git push "$REMOTE" "$BRANCH" --force

          echo "== open pull request =="
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Add oss-ready source, tests, docs, and CI" \
            --body "Automated bootstrap: unpack source/tests/docs/CI and remove temporary artifacts (zip + bootstrap workflows)." \
            || echo "PR may already exist - check the Pull requests tab"
